server:
  port: 8080

spring:
  application:
    name: distributed-rate-limiter
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  thymeleaf:
    cache: false

# Rate Limiter Configuration
ratelimiter:
  default-algorithm: TOKEN_BUCKET
  redis-enabled: true
  ip-limit:
    max-requests: 20
    window-seconds: 60
  plans:
    FREE:
      max-requests: 30
      window-seconds: 60
      burst-multiplier: 1.0
    PREMIUM:
      max-requests: 200
      window-seconds: 60
      burst-multiplier: 2.0
    ADMIN:
      max-requests: 1000
      window-seconds: 60
      burst-multiplier: 3.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
